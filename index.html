<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية الأسرة المعتمدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --secondary: #159895;
            --accent: #002b5b;
            --bg: #f4f7f6;
            --card: #ffffff;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        
        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
        }

        /* الحاوية الرئيسية مضبوطة للطباعة */
        .container { 
            width: 100%;
            max-width: 850px; /* العرض المثالي لورق A4 */
            margin: 0 auto; 
            background: var(--card); 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
        }

        header { text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        header h1 { margin: 0; color: var(--primary); font-size: 24px; }

        .header-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            font-weight: bold;
        }
        .header-info input {
            border: 1px solid #ddd;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: inherit;
            text-align: center;
            width: 120px;
        }

        .summary-banner {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .balance-card {
            background: var(--accent);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            text-align: center;
            min-width: 280px;
        }
        .balance-card strong { font-size: 32px; display: block; }

        /* الأقسام الجانبية */
        .sections-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card-box {
            flex: 1;
            min-width: 300px;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
            page-break-inside: avoid;
        }
        .card-box h3 { margin-top: 0; color: var(--primary); font-size: 16px; border-right: 3px solid var(--secondary); padding-right: 8px; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: bold; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }

        /* الجدول */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        table th { background: var(--primary); color: white; padding: 10px; text-align: right; }
        table td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .no-print-area { background: #eef2f3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .add-row-form { display: flex; gap: 10px; }
        
        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 8px 15px; font-family: inherit; font-weight: bold; }
        .btn-add { background: var(--secondary); color: white; }
        .btn-print { background: var(--accent); color: white; width: 100%; font-size: 18px; margin-top: 20px; padding: 15px; }
        .btn-del { background: #ff4d4d; color: white; padding: 3px 8px; font-size: 11px; }

        /* ضبط الطباعة النهائي */
        @media print {
            @page { size: A4; margin: 1cm; }
            body { background: white; padding: 0; }
            .container { width: 100%; max-width: 100%; border: none; box-shadow: none; padding: 0; }
            .no-print { display: none !important; }
            .card-box { background: white !important; border: 1px solid #ccc; break-inside: avoid; }
            .balance-card { border: 2px solid #000; color: #000 !important; background: #f0f0f0 !important; }
            input { border: none !important; font-weight: bold; font-size: 14px; background: transparent; }
            table th { background: #f0f0f0 !important; color: black !important; border: 1px solid #000; }
            table td { border: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>تقرير ميزانية الأسرة الشهري</h1>
        <div class="header-info">
            <span>راتب شهر:</span>
            <input type="text" id="m_name" class="in-save" placeholder="أدخل الشهر">
            <span>لسنة:</span>
            <input type="text" id="m_year" class="in-save" placeholder="2026">
        </div>
    </header>

    <div class="summary-banner">
        <div class="balance-card" id="cardStyle">
            <span>المتبقي من الدخل</span>
            <strong><span id="finalBalance">0</span> ريال</strong>
        </div>
    </div>

    <div class="sections-grid">
        <div class="card-box">
            <h3>الدخل الشهري</h3>
            <div class="input-group">
                <label>الراتب الأساسي:</label>
                <input type="number" class="calc-in" data-type="plus" id="sal" oninput="calc()">
            </div>
            <div class="input-group">
                <label>دخل إضافي (تحديده):</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="ext_note" class="in-save" placeholder="المصدر" style="flex:1">
                    <input type="number" class="calc-in" data-type="plus" id="ext_val" placeholder="0" style="width:100px" oninput="calc()">
                </div>
            </div>
        </div>

        <div class="card-box">
            <h3>الالتزامات والتمويل</h3>
            <div class="input-group"><label>تمويل شخصي:</label><input type="number" class="calc-in" id="l1" oninput="calc()"></div>
            <div class="input-group"><label>تمويل تأجيري:</label><input type="number" class="calc-in" id="l2" oninput="calc()"></div>
            <div class="input-group"><label>ديون ومستحقات:</label><input type="number" class="calc-in" id="l3" oninput="calc()"></div>
        </div>
    </div>

    <div class="card-box" style="margin-bottom:20px; width:100%">
        <h3>الفواتير الأساسية</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
            <div class="input-group"><label>جوال 1:</label><input type="number" class="calc-in" id="f1" oninput="calc()"></div>
            <div class="input-group"><label>جوال 2:</label><input type="number" class="calc-in" id="f2" oninput="calc()"></div>
            <div class="input-group"><label>جوال 3:</label><input type="number" class="calc-in" id="f3" oninput="calc()"></div>
            <div class="input-group"><label>جوال 4:</label><input type="number" class="calc-in" id="f4" oninput="calc()"></div>
            <div class="input-group"><label>انترنت:</label><input type="number" class="calc-in" id="f5" oninput="calc()"></div>
            <div class="input-group"><label>كهرباء:</label><input type="number" class="calc-in" id="f6" oninput="calc()"></div>
            <div class="input-group"><label>ماء:</label><input type="number" class="calc-in" id="f7" oninput="calc()"></div>
            <div class="input-group"><label>مدرسة:</label><input type="number" class="calc-in" id="f8" oninput="calc()"></div>
            <div class="input-group"><label>مواصلات:</label><input type="number" class="calc-in" id="f9" oninput="calc()"></div>
        </div>
    </div>

    <div class="card-box" style="width:100%">
        <h3>جدول المشتريات والمصروفات</h3>
        <div class="no-print no-print-area">
            <div class="add-row-form">
                <input type="text" id="ni_n" placeholder="البيان" style="flex:2">
                <input type="number" id="ni_p" placeholder="المبلغ" style="width:100px">
                <input type="date" id="ni_d" style="width:150px">
                <button class="btn btn-add" onclick="addRow()">+ إضافة</button>
            </div>
        </div>
        <table id="itemsTable">
            <thead>
                <tr>
                    <th>البيان</th>
                    <th>التاريخ</th>
                    <th>القيمة</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>

    <button class="btn btn-print no-print" onclick="window.print()">🖨️ طباعة الميزانية أو حفظ PDF</button>
</div>

<script>
    let list = JSON.parse(localStorage.getItem('my_budget_list')) || [];
    document.getElementById('ni_d').valueAsDate = new Date();

    function save() {
        document.querySelectorAll('.calc-in, .in-save').forEach(i => localStorage.setItem(i.id, i.value));
        localStorage.setItem('my_budget_list', JSON.stringify(list));
    }

    function load() {
        document.querySelectorAll('.calc-in, .in-save').forEach(i => {
            if(localStorage.getItem(i.id)) i.value = localStorage.getItem(i.id);
        });
        render();
        calc();
    }

    function addRow() {
        let n = document.getElementById('ni_n'), p = document.getElementById('ni_p'), d = document.getElementById('ni_d');
        if(!n.value || !p.value) return;
        list.push({id: Date.now(), n: n.value, p: parseFloat(p.value), d: d.value});
        n.value = ''; p.value = '';
        render(); calc();
    }

    function delRow(id) {
        list = list.filter(x => x.id !== id);
        render(); calc();
    }

    function render() {
        let b = document.getElementById('tBody'); b.innerHTML = '';
        list.forEach(x => {
            b.innerHTML += `<tr><td>${x.n}</td><td>${x.d}</td><td>${x.p.toFixed(2)}</td><td class="no-print"><button class="btn btn-del" onclick="delRow(${x.id})">حذف</button></td></tr>`;
        });
    }

    function calc() {
        let inc = 0, exp = 0;
        document.querySelectorAll('.calc-in').forEach(i => {
            let v = parseFloat(i.value) || 0;
            if(i.dataset.type === 'plus') inc += v; else exp += v;
        });
        list.forEach(x => exp += x.p);
        let res = inc - exp;
        document.getElementById('finalBalance').innerText = res.toLocaleString('ar-SA');
        document.getElementById('cardStyle').style.background = (res < 0) ? '#d21312' : '#002b5b';
        save();
    }

    window.onload = load;
</script>
</body>
</html>
