<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية الأسرة المعتمدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --accent: #002b5b;
            --border: #d1d5db;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; color: #1f2937; }

        .paper {
            width: 210mm; /* عرض ورق A4 */
            margin: 0 auto;
            background: #fff;
            padding: 20mm;
            min-height: 297mm;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
        }

        /* الترويسة */
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 30px; padding-bottom: 10px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 26px; }
        
        .meta-data { display: flex; justify-content: space-between; margin-top: 15px; font-weight: bold; border: 1px solid #eee; padding: 10px; border-radius: 5px; }
        .meta-data div { display: flex; gap: 10px; }

        /* صندوق المتبقي */
        .balance-box {
            border: 2px solid var(--accent);
            width: 250px;
            margin: 20px auto 40px;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background: #f9fafb;
        }
        .balance-box span { font-size: 14px; display: block; color: #6b7280; }
        .balance-box strong { font-size: 30px; color: var(--accent); }

        /* الشبكة الأساسية */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        
        .section-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .section-card h3 { 
            background: #f8fafc; 
            margin: 0; 
            padding: 10px; 
            font-size: 16px; 
            color: var(--primary); 
            border-bottom: 1px solid var(--border);
            border-right: 4px solid var(--primary);
        }

        .row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f3f4f6; align-items: center; }
        .row:last-child { border-bottom: none; }
        .row label { font-weight: 500; font-size: 14px; }
        .row .val { font-weight: bold; color: #111827; }

        /* إخفاء المدخلات عند الطباعة وإظهار القيم فقط */
        .row input { width: 80px; text-align: left; border: 1px solid #ddd; border-radius: 4px; padding: 4px; font-family: inherit; }
        
        /* جدول المصروفات */
        .expenses-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .expenses-table th { background: #f8fafc; text-align: right; padding: 10px; border: 1px solid var(--border); font-size: 13px; }
        .expenses-table td { padding: 10px; border: 1px solid var(--border); font-size: 13px; }

        .no-print { margin-top: 20px; text-align: center; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-family: inherit; }
        .btn-print { background: var(--accent); color: white; width: 210mm; margin: 20px auto; display: block; font-size: 18px; }
        .btn-add { background: #10b981; color: white; margin-bottom: 10px; }

        @media print {
            body { background: none; padding: 0; }
            .paper { box-shadow: none; width: 100%; padding: 10mm; margin: 0; }
            .no-print { display: none !important; }
            .row input { display: none; } /* إخفاء خانات الإدخال */
            .row .print-val { display: inline !important; } /* إظهار القيمة كنص */
            .btn-print { display: none; }
        }

        /* قيمة تظهر فقط في الطباعة */
        .print-val { display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="paper" id="content">
    <div class="header">
        <h1>تقرير ميزانية الأسرة الشهري</h1>
        <div class="meta-data">
            <div>
                <span>راتب شهر:</span>
                <input type="text" id="m_name" class="in-save" placeholder="مثال: فبراير">
                <span class="print-val" id="p_m_name"></span>
            </div>
            <div>
                <span>السنة:</span>
                <input type="text" id="m_year" class="in-save" placeholder="2026">
                <span class="print-val" id="p_m_year"></span>
            </div>
        </div>
    </div>

    <div class="balance-box">
        <span>المبلغ المتبقي الصافي</span>
        <strong><span id="finalBalance">0</span> ريال</strong>
    </div>

    <div class="main-grid">
        <div class="section-card">
            <h3>إيرادات الدخل</h3>
            <div class="row">
                <label>الدخل الأساسي (الراتب):</label>
                <input type="number" class="calc-in" data-type="plus" id="sal" oninput="calc()">
                <span class="print-val" id="p_sal">0</span>
            </div>
            <div class="row">
                <label id="p_ext_note_lbl">دخل إضافي:</label>
                <div class="no-print">
                    <input type="text" id="ext_note" class="in-save" placeholder="المصدر" style="width:100px; margin-left:5px" oninput="save()">
                    <input type="number" class="calc-in" data-type="plus" id="ext_val" oninput="calc()">
                </div>
                <span class="print-val" id="p_ext_val">0</span>
            </div>
        </div>

        <div class="section-card">
            <h3>الالتزامات البنكية</h3>
            <div class="row">
                <label>التمويل الشخصي:</label>
                <input type="number" class="calc-in" id="l1" oninput="calc()">
                <span class="print-val" id="p_l1">0</span>
            </div>
            <div class="row">
                <label>التمويل التأجيري:</label>
                <input type="number" class="calc-in" id="l2" oninput="calc()">
                <span class="print-val" id="p_l2">0</span>
            </div>
            <div class="row">
                <label>ديون أخرى:</label>
                <input type="number" class="calc-in" id="l3" oninput="calc()">
                <span class="print-val" id="p_l3">0</span>
            </div>
        </div>
    </div>

    <div class="section-card" style="margin-bottom:25px;">
        <h3>الفواتير والمصاريف الثابتة</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap:0 20px;">
            <div class="row"><label>جوال 1:</label><input type="number" class="calc-in" id="f1" oninput="calc()"><span class="print-val" id="p_f1">0</span></div>
            <div class="row"><label>جوال 2:</label><input type="number" class="calc-in" id="f2" oninput="calc()"><span class="print-val" id="p_f2">0</span></div>
            <div class="row"><label>جوال 3:</label><input type="number" class="calc-in" id="f3" oninput="calc()"><span class="print-val" id="p_f3">0</span></div>
            <div class="row"><label>جوال 4:</label><input type="number" class="calc-in" id="f4" oninput="calc()"><span class="print-val" id="p_f4">0</span></div>
            <div class="row"><label>انترنت:</label><input type="number" class="calc-in" id="f5" oninput="calc()"><span class="print-val" id="p_f5">0</span></div>
            <div class="row"><label>كهرباء:</label><input type="number" class="calc-in" id="f6" oninput="calc()"><span class="print-val" id="p_f6">0</span></div>
            <div class="row"><label>ماء:</label><input type="number" class="calc-in" id="f7" oninput="calc()"><span class="print-val" id="p_f7">0</span></div>
            <div class="row"><label>مدرسة:</label><input type="number" class="calc-in" id="f8" oninput="calc()"><span class="print-val" id="p_f8">0</span></div>
            <div class="row" style="grid-column: span 2;"><label>مواصلات:</label><input type="number" class="calc-in" id="f9" oninput="calc()"><span class="print-val" id="p_f9">0</span></div>
        </div>
    </div>

    <div class="section-card">
        <h3>جدول المشتريات والمصروفات</h3>
        <div class="no-print" style="padding:10px; background:#f0fdf4">
            <input type="text" id="ni_n" placeholder="البيان" style="width:40%">
            <input type="number" id="ni_p" placeholder="المبلغ" style="width:20%">
            <input type="date" id="ni_d" style="width:25%">
            <button class="btn btn-add" onclick="addRow()">+ إضافة</button>
        </div>
        <table class="expenses-table">
            <thead>
                <tr>
                    <th>البيان</th>
                    <th>التاريخ</th>
                    <th>القيمة</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<button class="btn btn-print no-print" onclick="prepareAndPrint()">🖨️ طباعة الميزانية (PDF)</button>

<script>
    let list = JSON.parse(localStorage.getItem('budget_v3_list')) || [];
    
    function prepareAndPrint() {
        // نقل قيم المدخلات إلى نصوص الطباعة
        document.querySelectorAll('input').forEach(input => {
            let pSpan = document.getElementById('p_' + input.id);
            if (pSpan) pSpan.innerText = input.value || (input.type === 'number' ? '0' : '---');
        });
        
        // معالجة ملاحظة الدخل الإضافي
        let note = document.getElementById('ext_note').value;
        if(note) document.getElementById('p_ext_note_lbl').innerText = "دخل إضافي (" + note + "):";
        
        window.print();
    }

    function save() {
        document.querySelectorAll('.calc-in, .in-save').forEach(i => localStorage.setItem('v3_'+i.id, i.value));
        localStorage.setItem('budget_v3_list', JSON.stringify(list));
    }

    function load() {
        document.querySelectorAll('.calc-in, .in-save').forEach(i => {
            if(localStorage.getItem('v3_'+i.id)) i.value = localStorage.getItem('v3_'+i.id);
        });
        render(); calc();
    }

    function addRow() {
        let n = document.getElementById('ni_n'), p = document.getElementById('ni_p'), d = document.getElementById('ni_d');
        if(!n.value || !p.value) return;
        list.push({id: Date.now(), n: n.value, p: parseFloat(p.value), d: d.value});
        n.value = ''; p.value = ''; render(); calc();
    }

    function delRow(id) { list = list.filter(x => x.id !== id); render(); calc(); }

    function render() {
        let b = document.getElementById('tBody'); b.innerHTML = '';
        list.forEach(x => {
            b.innerHTML += `<tr><td>${x.n}</td><td>${x.d}</td><td>${x.p.toLocaleString()} ريال</td><td class="no-print"><button onclick="delRow(${x.id})">حذف</button></td></tr>`;
        });
    }

    function calc() {
        let inc = 0, exp = 0;
        document.querySelectorAll('.calc-in').forEach(i => {
            let v = parseFloat(i.value) || 0;
            if(i.dataset.type === 'plus') inc += v; else exp += v;
        });
        list.forEach(x => exp += x.p);
        document.getElementById('finalBalance').innerText = (inc - exp).toLocaleString();
        save();
    }

    window.onload = load;
    document.getElementById('ni_d').valueAsDate = new Date();
</script>
</body>
</html>
