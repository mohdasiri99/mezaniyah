<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية الأسرة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #0891b2;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --bg: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1e293b; }

        .app-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .paper { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; overflow: hidden; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--secondary); padding-bottom: 20px; margin-bottom: 30px; }
        .logo-area h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .family-badge { background: var(--secondary); color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .meta-item { display: flex; flex-direction: column; font-size: 13px; }
        .meta-item label { font-weight: bold; margin-bottom: 4px; }
        .meta-item input { border: 1px solid #cbd5e1; padding: 6px; border-radius: 4px; font-family: inherit; }

        .dashboard { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { background: #fff; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        
        .stat-cards { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .stat-card { padding: 15px; border-radius: 8px; color: white; position: relative; }
        .card-income { background: var(--success); }
        .card-remaining { background: var(--primary); }
        .stat-card small { font-size: 12px; opacity: 0.9; }
        .stat-card div { font-size: 22px; font-weight: bold; }

        .advisor { background: #fffbeb; border-right: 5px solid var(--warning); padding: 15px; border-radius: 4px; margin-bottom: 25px; font-size: 14px; display: none; }

        .grid-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section-box { border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; }
        .section-box h3 { margin: 0 0 15px 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: var(--secondary); }
        
        .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .entry-row label { font-size: 14px; font-weight: 500; }
        .entry-row input { width: 100px; border: 1px solid #e2e8f0; padding: 6px; border-radius: 4px; text-align: center; font-family: inherit; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s; font-size: 13px; }
        .btn-main { background: var(--secondary); color: white; }
        .btn-outline { background: #fff; border: 1px solid #cbd5e1; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: #f8fafc; text-align: right; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .app-container { margin: 0; padding: 0; max-width: 100%; }
            .paper { box-shadow: none; border: none; padding: 0; width: 100%; }
            .entry-row input { display: none; }
            .print-only-val { display: inline-block !important; font-weight: bold; }
            .dashboard { grid-template-columns: 1fr 1fr; }
            @page { margin: 1cm; size: A4; }
            .section-box { break-inside: avoid; }
        }
        .print-only-val { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="toolbar no-print">
        <button class="btn btn-main" onclick="prepareAndPrint()">🖨️ طباعة الميزانية (PDF)</button>
        <button class="btn btn-outline" onclick="exportData()">💾 حفظ نسخة احتياطية</button>
        <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📂 استيراد</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button class="btn btn-outline" style="color:var(--danger)" onclick="clearAll()">🗑️ مسح السجل</button>
    </div>

    <div class="paper" id="mainReport">
        <header>
            <div class="logo-area">
                <h1>ميزانية الأسرة الشهرية</h1>
                <div id="printDate" style="font-size:12px; color:#64748b; margin-top:5px;"></div>
            </div>
            <div class="family-badge">خاص وسري للأسرة</div>
        </header>

        <div class="meta-grid">
            <div class="meta-item">
                <label>راتب شهر:</label>
                <input type="text" id="m_name" class="in-save" placeholder="أدخل الشهر">
                <span class="print-only-val" id="p_m_name"></span>
            </div>
            <div class="meta-item">
                <label>السنة:</label>
                <input type="text" id="m_year" class="in-save" placeholder="2026">
                <span class="print-only-val" id="p_m_year"></span>
            </div>
            <div class="meta-item">
                <label>رب الأسرة:</label>
                <input type="text" id="u_name" class="in-save" placeholder="الاسم الكريم">
                <span class="print-only-val" id="p_u_name"></span>
            </div>
        </div>

        <div id="financialAdvisor" class="advisor"></div>

        <div class="dashboard">
            <div class="chart-container">
                <canvas id="budgetChart" style="max-height: 180px;"></canvas>
            </div>
            <div class="stat-cards">
                <div class="stat-card card-income">
                    <small>إجمالي الدخل</small>
                    <div id="totalIncDisp">0 ريال</div>
                </div>
                <div class="stat-card card-remaining">
                    <small>المتبقي للادخار/الطوارئ</small>
                    <div id="totalRemDisp">0 ريال</div>
                </div>
            </div>
        </div>

        <div class="grid-sections">
            <div class="section-box">
                <h3>💰 الدخل والالتزامات البنكية</h3>
                <div class="entry-row">
                    <label>الراتب الأساسي:</label>
                    <input type="number" id="s1" class="calc-in" data-grp="inc" oninput="calc()">
                    <span class="print-only-val" id="p_s1">0</span>
                </div>
                <div class="entry-row">
                    <label>دخل إضافي:</label>
                    <input type="number" id="s2" class="calc-in" data-grp="inc" oninput="calc()">
                    <span class="print-only-val" id="p_s2">0</span>
                </div>
                <div style="margin-top:10px; padding-top:10px; border-top: 1px dashed #ccc;">
                    <div class="entry-row">
                        <label>تمويل شخصي:</label>
                        <input type="number" id="debt_p" class="calc-in" data-grp="debt" oninput="calc()">
                        <span class="print-only-val" id="p_debt_p">0</span>
                    </div>
                    <div class="entry-row">
                        <label>تمويل عقاري:</label>
                        <input type="number" id="debt_h" class="calc-in" data-grp="debt" oninput="calc()">
                        <span class="print-only-val" id="p_debt_h">0</span>
                    </div>
                </div>
            </div>

            <div class="section-box">
                <h3>🏠 المصاريف الثابتة</h3>
                <div class="entry-row"><label>الكهرباء والماء:</label><input type="number" id="v1" class="calc-in" data-grp="bill" oninput="calc()"><span class="print-only-val" id="p_v1">0</span></div>
                <div class="entry-row"><label>اتصالات وإنترنت:</label><input type="number" id="v2" class="calc-in" data-grp="bill" oninput="calc()"><span class="print-only-val" id="p_v2">0</span></div>
                <div class="entry-row"><label>إيجار / رسوم دراسة:</label><input type="number" id="v3" class="calc-in" data-grp="bill" oninput="calc()"><span class="print-only-val" id="p_v3">0</span></div>
                <div class="entry-row"><label>مصروف شخصي:</label><input type="number" id="v_pers" class="calc-in" data-grp="bill" oninput="calc()"><span class="print-only-val" id="p_v_pers">0</span></div>
                <div class="entry-row"><label>مواصلات / وقود:</label><input type="number" id="v_trans" class="calc-in" data-grp="bill" oninput="calc()"><span class="print-only-val" id="p_v_trans">0</span></div>
            </div>
        </div>

        <div class="section-box" style="margin-top:20px;">
            <h3>🛒 سجل المشتريات المتغيرة</h3>
            <div class="no-print" style="margin-bottom:15px; display:flex; gap:10px; background: #f1f5f9; padding: 10px; border-radius: 8px;">
                <input type="text" id="itemName" placeholder="البيان (مثلاً: مقاضي البيت)" style="flex:2; padding:8px;">
                <input type="number" id="itemVal" placeholder="المبلغ" style="flex:1; padding:8px;">
                <button class="btn btn-main" onclick="addItem()">إضافة</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>البيان</th>
                        <th>المبلغ</th>
                        <th class="no-print">إجراء</th>
                    </tr>
                </thead>
                <tbody id="itemBody"></tbody>
            </table>
        </div>

        <footer style="margin-top:30px; border-top:1px solid #eee; padding-top:15px; text-align: center; font-size: 11px; color: #999;">
            تم استخراج هذا التقرير للاستخدام العائلي الخاص - محفوظ تلقائياً
        </footer>
    </div>
</div>

<script>
    let dynamicItems = JSON.parse(localStorage.getItem('family_budget_items')) || [];
    let myChart;

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['المتبقي', 'الالتزامات البنكية', 'فواتير ثابتة', 'مشتريات'],
                datasets: [{ data: [100, 0, 0, 0], backgroundColor: ['#059669', '#dc2626', '#0891b2', '#d97706'], borderWidth: 0 }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'bottom', labels: { font: { family: 'Noto Sans Arabic', size: 10 } } } } }
        });
    }

    function calc() {
        let totals = { inc: 0, debt: 0, bill: 0, spend: 0 };
        document.querySelectorAll('.calc-in').forEach(i => {
            let v = parseFloat(i.value) || 0;
            totals[i.dataset.grp] += v;
        });
        dynamicItems.forEach(item => totals.spend += item.v);
        let remaining = totals.inc - (totals.debt + totals.bill + totals.spend);
        document.getElementById('totalIncDisp').innerText = totals.inc.toLocaleString() + ' ريال';
        document.getElementById('totalRemDisp').innerText = remaining.toLocaleString() + ' ريال';
        myChart.data.datasets[0].data = [Math.max(0, remaining), totals.debt, totals.bill, totals.spend];
        myChart.update();
        const advisor = document.getElementById('financialAdvisor');
        if (remaining < 0) {
            advisor.style.display = 'block';
            advisor.innerText = `⚠️ تنبيه: المصاريف تجاوزت الدخل المتاح بمقدار ${Math.abs(remaining)} ريال.`;
        } else { advisor.style.display = 'none'; }
        save();
    }

    function addItem() {
        let n = document.getElementById('itemName'), v = document.getElementById('itemVal');
        if(!n.value || !v.value) return;
        dynamicItems.push({ n: n.value, v: parseFloat(v.value) });
        n.value = ''; v.value = ''; renderItems(); calc();
    }

    function renderItems() {
        const b = document.getElementById('itemBody');
        b.innerHTML = '';
        dynamicItems.forEach((item, i) => {
            b.innerHTML += `<tr><td>${item.n}</td><td>${item.v.toLocaleString()} ريال</td><td class="no-print"><button onclick="removeItem(${i})" style="color:red; border:none; background:none; cursor:pointer">✖</button></td></tr>`;
        });
    }

    function removeItem(i) { dynamicItems.splice(i, 1); renderItems(); calc(); }

    function save() {
        document.querySelectorAll('.calc-in, .in-save').forEach(i => localStorage.setItem('fam_'+i.id, i.value));
        localStorage.setItem('family_budget_items', JSON.stringify(dynamicItems));
    }

    function load() {
        document.querySelectorAll('.calc-in, .in-save').forEach(i => {
            if(localStorage.getItem('fam_'+i.id)) i.value = localStorage.getItem('fam_'+i.id);
        });
        document.getElementById('printDate').innerText = 'تاريخ التقرير: ' + new Date().toLocaleDateString('ar-SA');
        renderItems(); calc();
    }

    function prepareAndPrint() {
        document.querySelectorAll('input').forEach(i => {
            let p = document.getElementById('p_' + i.id);
            if(p) p.innerText = i.value || '---';
        });
        window.print();
    }

    function exportData() {
        const data = { inputs: {}, items: dynamicItems };
        document.querySelectorAll('.calc-in, .in-save').forEach(i => data.inputs[i.id] = i.value);
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `family_budget.json`; a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const data = JSON.parse(event.target.result);
            Object.keys(data.inputs).forEach(key => { if(document.getElementById(key)) document.getElementById(key).value = data.inputs[key]; });
            dynamicItems = data.items; renderItems(); calc();
        };
        reader.readAsText(e.target.files[0]);
    }

    function clearAll() { if(confirm('هل تريد مسح البيانات؟')) { localStorage.clear(); location.reload(); } }

    window.onload = () => { initChart(); load(); };
</script>

</body>
</html>
