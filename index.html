<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة ميزانية الأسرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --secondary: #159895;
            --accent: #002b5b;
            --danger: #d21312;
            --bg: #f4f7f6;
            --card: #ffffff;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Kufi Arabic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 30px; padding-bottom: 20px; }
        header h1 { margin: 0; color: var(--primary); font-size: 28px; margin-bottom: 15px; }

        /* تنسيق جدول الشهر والسنة في الترويسة */
        .month-year-picker {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--secondary);
            max-width: 500px;
            margin: 0 auto;
        }
        .month-year-picker label { font-weight: bold; color: var(--accent); }
        .month-year-picker input { 
            padding: 5px 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-family: inherit;
            text-align: center;
        }

        .summary-banner {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            page-break-inside: avoid;
        }
        .balance-card {
            background: var(--accent);
            color: white;
            padding: 25px 50px;
            border-radius: 15px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .balance-card span { display: block; font-size: 16px; opacity: 0.9; }
        .balance-card strong { font-size: 36px; display: block; margin-top: 5px; }

        .grid-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card-box { border: 1px solid #eee; padding: 20px; border-radius: 10px; background: #fafafa; }
        .card-box h3 { margin-top: 0; color: var(--primary); font-size: 18px; border-right: 4px solid var(--secondary); padding-right: 10px; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: right; }
        table td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .add-row-form { display: flex; gap: 10px; margin-bottom: 15px; background: #eef2f3; padding: 15px; border-radius: 8px; }
        
        .btn { cursor: pointer; border: none; border-radius: 5px; padding: 10px 20px; font-family: inherit; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--secondary); color: white; }
        .btn-print { background: var(--accent); color: white; width: 100%; font-size: 18px; margin-top: 30px; padding: 15px; }
        .btn-del { background: var(--danger); color: white; padding: 5px 10px; font-size: 12px; }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; margin: 0; padding: 10px; }
            .no-print { display: none !important; }
            .card-box { background: white; border: 1px solid #ddd; page-break-inside: avoid; }
            .balance-card { background: #eee !important; color: black !important; border: 2px solid black; box-shadow: none; }
            .balance-card strong { color: black !important; }
            table th { background: #eee !important; color: black !important; border: 1px solid #000; }
            .month-year-picker { border: none; background: white; }
            .month-year-picker input { border: none; font-weight: bold; font-size: 1.1rem; }
            input { border: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>تقرير ميزانية الأسرة الشهري</h1>
        <div class="month-year-picker">
            <label>راتب شهر:</label>
            <input type="text" id="budgetMonth" class="in-val" placeholder="أدخل الشهر" oninput="saveAllInputs()">
            <label>سنة:</label>
            <input type="number" id="budgetYear" class="in-val" placeholder="2024" oninput="saveAllInputs()">
        </div>
    </header>

    <div class="summary-banner">
        <div class="balance-card" id="balanceCard">
            <span>المبلغ المتبقي الصافي</span>
            <strong><span id="finalBalance">0</span> ريال</strong>
        </div>
    </div>

    <div class="grid-section">
        <div class="card-box">
            <h3>إيرادات الدخل</h3>
            <div class="input-group">
                <label>الدخل الأساسي (الراتب):</label>
                <input type="number" class="in-val" data-type="income" id="salary" placeholder="0" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>دخل إضافي (تحديد المصدر):</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="extraIncomeNote" class="in-val" placeholder="مصدر الدخل" style="flex:2" oninput="saveAllInputs()">
                    <input type="number" class="in-val" data-type="income" id="extraIncome" placeholder="0" style="flex:1" oninput="calculate()">
                </div>
            </div>
        </div>

        <div class="card-box">
            <h3>الالتزامات البنكية والدفعات</h3>
            <div class="input-group">
                <label>التمويل الشخصي:</label>
                <input type="number" class="in-val" data-type="expense" id="personalLoan" placeholder="0" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>التمويل التأجيري:</label>
                <input type="number" class="in-val" data-type="expense" id="leaseLoan" placeholder="0" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>ديون أو مستحقات أخرى:</label>
                <input type="number" class="in-val" data-type="expense" id="otherDebts" placeholder="0" oninput="calculate()">
            </div>
        </div>
    </div>

    <div class="card-box" style="margin-bottom:30px;">
        <h3>الفواتير والمصاريف الثابتة</h3>
        <div class="grid-section" style="margin-bottom:0;">
            <div>
                <div class="input-group"><label>جوال 1:</label><input type="number" class="in-val" data-type="expense" id="mob1" oninput="calculate()"></div>
                <div class="input-group"><label>جوال 2:</label><input type="number" class="in-val" data-type="expense" id="mob2" oninput="calculate()"></div>
                <div class="input-group"><label>جوال 3:</label><input type="number" class="in-val" data-type="expense" id="mob3" oninput="calculate()"></div>
                <div class="input-group"><label>جوال 4:</label><input type="number" class="in-val" data-type="expense" id="mob4" oninput="calculate()"></div>
                <div class="input-group"><label>إنترنت:</label><input type="number" class="in-val" data-type="expense" id="internet" oninput="calculate()"></div>
            </div>
            <div>
                <div class="input-group"><label>الكهرباء:</label><input type="number" class="in-val" data-type="expense" id="elec" oninput="calculate()"></div>
                <div class="input-group"><label>الماء:</label><input type="number" class="in-val" data-type="expense" id="water" oninput="calculate()"></div>
                <div class="input-group"><label>تكاليف مدرسة:</label><input type="number" class="in-val" data-type="expense" id="school" oninput="calculate()"></div>
                <div class="input-group"><label>تكاليف مواصلات:</label><input type="number" class="in-val" data-type="expense" id="trans" oninput="calculate()"></div>
            </div>
        </div>
    </div>

    <div class="card-box">
        <h3>جدول المصروفات المشتراة (متغير)</h3>
        <div class="add-row-form no-print">
            <input type="text" id="newItemName" placeholder="ماذا اشتريت؟" style="flex:2">
            <input type="number" id="newItemPrice" placeholder="المبلغ" style="flex:1">
            <input type="date" id="newItemDate" style="flex:1">
            <button class="btn btn-add" onclick="addItem()">إضافة للجدول</button>
        </div>
        <table id="dynamicTable">
            <thead>
                <tr>
                    <th>البيان</th>
                    <th>التاريخ</th>
                    <th>القيمة</th>
                    <th class="no-print">إجراء</th>
                </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>

    <button class="btn btn-print no-print" onclick="window.print()">🖨️ طباعة أو حفظ التقرير كـ PDF</button>
</div>

<script>
    let expensesList = JSON.parse(localStorage.getItem('expensesList')) || [];
    document.getElementById('newItemDate').valueAsDate = new Date();

    function saveAllInputs() {
        const inputs = document.querySelectorAll('.in-val');
        inputs.forEach(input => {
            localStorage.setItem(input.id, input.value);
        });
    }

    function loadSavedData() {
        const inputs = document.querySelectorAll('.in-val');
        inputs.forEach(input => {
            if (localStorage.getItem(input.id)) {
                input.value = localStorage.getItem(input.id);
            }
        });
        renderTable();
        calculate();
    }

    function addItem() {
        const name = document.getElementById('newItemName');
        const price = document.getElementById('newItemPrice');
        const date = document.getElementById('newItemDate');

        if (name.value === '' || price.value === '') { alert('فضلاً أدخل اسم السلعة والسعر'); return; }

        const item = { id: Date.now(), name: name.value, price: parseFloat(price.value), date: date.value };
        expensesList.push(item);
        localStorage.setItem('expensesList', JSON.stringify(expensesList));
        name.value = ''; price.value = '';
        renderTable(); calculate();
    }

    function deleteItem(id) {
        expensesList = expensesList.filter(item => item.id !== id);
        localStorage.setItem('expensesList', JSON.stringify(expensesList));
        renderTable(); calculate();
    }

    function renderTable() {
        const body = document.getElementById('itemsBody');
        body.innerHTML = '';
        expensesList.forEach(item => {
            body.innerHTML += `<tr><td>${item.name}</td><td>${item.date}</td><td>${item.price.toFixed(2)}</td><td class="no-print"><button class="btn btn-del" onclick="deleteItem(${item.id})">حذف</button></td></tr>`;
        });
    }

    function calculate() {
        let totalIncome = 0; let totalExpenses = 0;
        document.querySelectorAll('.in-val').forEach(input => {
            const val = parseFloat(input.value) || 0;
            if (input.dataset.type === 'income') totalIncome += val;
            else if (input.dataset.type === 'expense') totalExpenses += val;
        });
        expensesList.forEach(item => { totalExpenses += item.price; });
        const final = totalIncome - totalExpenses;
        document.getElementById('finalBalance').innerText = final.toLocaleString('ar-SA');
        document.getElementById('balanceCard').style.background = (final < 0) ? '#d21312' : '#002b5b';
        saveAllInputs();
    }

    window.onload = loadSavedData;
</script>
</body>
</html>
